input {
  beats {
    port => 5044
  }
}

filter {
  # Parse the log into components like timestamp, severity, and message
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+\[%{LOGLEVEL:severity}\]\s+%{GREEDYDATA:log_message}" }
  }

  # Filter logs by severity levels
  if [severity] {
    mutate {
      uppercase => [ "severity" ]
    }
    
    # We drop any log that is not INFO, WARNING, or ERROR (e.g., DEBUG, TRACE)
    if [severity] not in ["INFO", "WARNING", "ERROR"] {
      drop { }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
  # Keep stdout to debug Logstash easily in Docker logs
  stdout { codec => rubydebug }
}
